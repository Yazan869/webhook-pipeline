services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yazan_admin
      POSTGRES_PASSWORD: yazan_password_123
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yazan_admin -d pipeline_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://yazan_admin:yazan_password_123@db:5432/pipeline_db
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    # Use the npm script we tested locally
    command: npm run start:api

  worker:
    build: .
    environment:
      - DATABASE_URL=postgres://yazan_admin:yazan_password_123@db:5432/pipeline_db
    depends_on:
      db:
        condition: service_healthy
    # Use the npm script we tested locally
    command: npm run start:worker

volumes:
  pgdata: